name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PASO NUEVO: Instala las dependencias dentro de la carpeta client antes de compilar
      - name: Go into client and install dependencies
        run: cd client && npm ci

      # PASO CORREGIDO: Ahora que vite ya existe, compila de forma segura (quitamos el deploy manual)
      - name: Build project
        run: cd client && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFOLIOPERSONAL_7CDAE }}
          projectId: portfoliopersonal-7cdae
